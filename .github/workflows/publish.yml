name: Publish package

# Manual run from the Actions tab ("Run workflow"), or automatically when a
# GitHub Release is published. Publishes to GitHub Packages as
# @omgitsarnout/arniewaves-design-system.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump before publishing"
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
  release:
    types: [published]

permissions:
  contents: write # allow pushing the version bump commit + tag
  packages: write # allow publishing to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@omgitsarnout"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bump != 'none' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.bump }} -m "release: v%s"
          git push --follow-tags

      - name: Build library
        run: npm run build:lib

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
